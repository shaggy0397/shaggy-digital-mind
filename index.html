<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Meta Tags -->
    <title>SHAGGY digital mind</title>
    <meta name="theme-color" content="#111827"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DEIMON">
    <meta name="description" content="Tu asistente de memoria digital potenciado por IA.">
    
    <link rel="manifest" href="manifest.json">
    <!-- Icons for PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://placehold.co/192x192/4f46e5/ffffff?text=D">
    <link rel="apple-touch-icon" href="https://placehold.co/180x180/4f46e5/ffffff?text=D">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #note-area:focus, #chat-input:focus, #api-key-input:focus { box-shadow: 0 0 0 2px #4f46e5; outline: none; }
        .btn-mic-recording { animation: pulse-rect 1.5s infinite; }
        @keyframes pulse-rect {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .chat-bubble { max-width: 80%; cursor: pointer; }
        .chat-bubble-user { background-color: #4f46e5; color: white; align-self: flex-end; cursor: default; }
        .chat-bubble-ai { background-color: #374151; color: #d1d5db; align-self: flex-start; }
        .title-gradient {
            background: linear-gradient(90deg, #a78bfa, #f472b6, #60a5fa, #a78bfa);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-animation 6s ease infinite;
        }
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        /* Modal Styles */
        #settings-modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-900 text-gray-200">

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50 hidden opacity-0">
        <div class="bg-gray-800 rounded-2xl shadow-xl p-6 w-full max-w-md">
            <h3 class="text-xl font-bold text-white mb-4">Configuración</h3>
            <label for="api-key-input" class="block text-sm font-medium text-gray-300 mb-2">Clave de API de Google AI</label>
            <input type="password" id="api-key-input" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-white" placeholder="Pega tu clave aquí">
            <p class="text-xs text-gray-400 mt-2">Tu clave se guarda de forma segura en tu navegador. Puedes obtener una gratis en Google AI Studio.</p>
            <div class="flex gap-4 mt-6">
                <button id="save-api-key" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-indigo-700 transition">Guardar</button>
                <button id="close-modal" class="w-full bg-gray-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-500 transition">Cerrar</button>
            </div>
        </div>
    </div>

    <div class="max-w-3xl mx-auto p-4 sm:p-6 my-4 sm:my-8 mb-16">
        <header class="text-center mb-6">
            <h1 class="text-4xl sm:text-5xl font-bold title-gradient">SHAGGY digital mind</h1>
            <p class="text-lg text-gray-400 mt-2">Tu asistente de memoria digital</p>
            <p class="text-sm text-gray-500 mt-2">Powered by DEIMON ENTERPRISE technology</p>
        </header>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg">
            <label for="note-area" class="text-lg font-semibold mb-2 block text-gray-300">Escribe o dicta tu nota:</label>
            <textarea id="note-area" rows="6" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg text-lg text-white placeholder-gray-400 transition" placeholder="Ej: Vender el producto Astro-1 a Julián por $350..."></textarea>
            
            <div class="grid grid-cols-2 items-center mt-4 gap-4">
                <button id="save-note-button" class="w-full bg-indigo-600 text-white font-bold py-3 px-5 rounded-lg hover:bg-indigo-700 transition-all shadow-md">Guardar Nota</button>
                <button id="search-today-button" class="w-full bg-teal-600 text-white font-bold py-3 px-5 rounded-lg hover:bg-teal-700 transition-all shadow-md">Notas de Hoy</button>
                <button id="mic-button" class="col-span-2 w-full flex items-center justify-center gap-3 bg-red-600 text-white font-bold py-4 px-5 rounded-lg hover:bg-red-700 transition-all shadow-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                    <span id="mic-text">Grabar Voz</span>
                </button>
            </div>
        </div>

        <div class="mt-8 bg-gray-800 p-4 sm:p-6 rounded-2xl shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-center text-white">Habla con DEIMON</h2>
                <div class="flex items-center gap-2">
                     <button id="settings-button" class="p-2 rounded-full hover:bg-gray-700 transition-colors" title="Configuración">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    </button>
                    <button id="mute-button" class="p-2 rounded-full hover:bg-gray-700 transition-colors" title="Silenciar"></button>
                </div>
            </div>
            <div id="chat-window" class="h-64 border border-gray-700 rounded-lg p-4 overflow-y-auto flex flex-col gap-3 mb-4 bg-gray-900">
                 <!-- Chat messages will appear here -->
            </div>
            <div class="flex gap-2">
                <input type="text" id="chat-input" class="flex-grow min-w-0 p-3 bg-gray-700 border border-gray-600 rounded-lg text-lg text-white placeholder-gray-400" placeholder="O pregunta por las 'notas de hoy'">
                <button id="send-chat-button" class="flex-shrink-0 bg-emerald-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-emerald-700 transition-all shadow-md">Enviar</button>
            </div>
        </div>
    </div>

<script>
// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
    const swCode = `
        const CACHE_NAME = 'deimon-cache-v1';
        self.addEventListener('install', event => { event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['/', 'https://cdn.tailwindcss.com']))); });
        self.addEventListener('fetch', event => { event.respondWith(caches.match(event.request).then(response => response || fetch(event.request))); });
    `;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(err => console.error('Error al registrar Service Worker:', err));
}
// PWA Manifest
const manifest = {
    "name": "SHAGGY digital mind (DEIMON)", "short_name": "DEIMON", "start_url": ".", "display": "standalone", "background_color": "#111827", "theme_color": "#111827",
    "icons": [{ "src": "https://placehold.co/192x192/4f46e5/ffffff?text=D", "sizes": "192x192", "type": "image/png" }, { "src": "https://placehold.co/512x512/4f46e5/ffffff?text=D", "sizes": "512x512", "type": "image/png" }]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
document.querySelector('link[rel="manifest"]').setAttribute('href', manifestURL);


document.addEventListener('DOMContentLoaded', () => {
    // DOM Elements
    const noteArea = document.getElementById('note-area');
    const micButton = document.getElementById('mic-button');
    const micText = document.getElementById('mic-text');
    const saveNoteButton = document.getElementById('save-note-button');
    const searchTodayButton = document.getElementById('search-today-button'); // New button
    const muteButton = document.getElementById('mute-button');
    const chatWindow = document.getElementById('chat-window');
    const chatInput = document.getElementById('chat-input');
    const sendChatButton = document.getElementById('send-chat-button');
    const settingsModal = document.getElementById('settings-modal');
    const settingsButton = document.getElementById('settings-button');
    const closeModal = document.getElementById('close-modal');
    const apiKeyInput = document.getElementById('api-key-input');
    const saveApiKeyButton = document.getElementById('save-api-key');
    
    // State
    let isRecording = false, recognition, allNotes = [], isMuted = false, audioContext, finalTranscript = '';
    const messageAudios = new Map();

    // Icons
    const iconSpeakerOn = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
    const iconSpeakerOff = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;

    function initialize() {
        // Now loads objects with text and date
        allNotes = JSON.parse(localStorage.getItem('deimonNotes') || '[]');
        updateMuteButtonIcon();
        try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { console.error("Web Audio API not supported."); }

        if (!localStorage.getItem('geminiApiKey')) {
            addMessageToChat("¡Bienvenido! Para activar el chat, por favor agrega tu clave de API de Google AI en el menú de configuración (el ícono de engrane).", 'ai');
        } else {
            addMessageToChat("¡Hola! Soy DEIMON. Tus notas se guardan automáticamente. ¿En qué te puedo ayudar hoy?", 'ai');
        }
    }

    // --- Settings Modal Logic ---
    settingsButton.addEventListener('click', () => {
        apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
        settingsModal.classList.remove('hidden');
        setTimeout(() => settingsModal.classList.remove('opacity-0'), 10);
    });
    closeModal.addEventListener('click', () => {
        settingsModal.classList.add('opacity-0');
        setTimeout(() => settingsModal.classList.add('hidden'), 300);
    });
    saveApiKeyButton.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (key) {
            localStorage.setItem('geminiApiKey', key);
            addMessageToChat("Clave de API guardada correctamente. ¡Ya puedes chatear!", 'ai');
            closeModal.click();
        }
    });

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'es-MX';
        recognition.onstart = () => { isRecording = true; micText.textContent = 'Escuchando...'; micButton.classList.add('btn-mic-recording'); finalTranscript = noteArea.value; };
        recognition.onend = () => { isRecording = false; micText.textContent = 'Grabar Voz'; micButton.classList.remove('btn-mic-recording'); };
        recognition.onerror = (e) => { console.error("Error de reconocimiento:", e.error); recognition.onend(); };
        recognition.onresult = (event) => {
            let interimTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) { finalTranscript += event.results[i][0].transcript + ' '; } 
                else { interimTranscript += event.results[i][0].transcript; }
            }
            noteArea.value = finalTranscript + interimTranscript;
        };
        micButton.addEventListener('click', () => isRecording ? recognition.stop() : recognition.start());
    } else { micButton.disabled = true; micText.textContent = 'Navegador no compatible'; }

    // --- Note Saving Logic (with Date) ---
    saveNoteButton.addEventListener('click', () => {
        const noteText = noteArea.value.trim();
        if (noteText) {
            const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD format
            const newNote = { text: noteText, date: today };
            allNotes.push(newNote);
            localStorage.setItem('deimonNotes', JSON.stringify(allNotes));
            noteArea.value = ''; finalTranscript = '';
            saveNoteButton.textContent = '¡Guardada!';
            setTimeout(() => { saveNoteButton.textContent = 'Guardar Nota'; }, 1500);
        }
    });

    // --- NEW: Search Today's Notes Button Logic ---
    searchTodayButton.addEventListener('click', () => {
        const today = new Date().toISOString().split('T')[0];
        const todaysNotes = allNotes.filter(note => note.date === today);

        let responseText;
        if (todaysNotes.length > 0) {
            responseText = "Aquí están tus notas de hoy:\n" + todaysNotes.map((note, index) => `${index + 1}. ${note.text}`).join('\n');
        } else {
            responseText = "No encontré ninguna nota guardada para el día de hoy.";
        }
        
        addMessageToChat(responseText, 'ai');
        // Optionally, speak the response
        const apiKey = localStorage.getItem('geminiApiKey');
        if (apiKey) {
            speakAndShowMessage(responseText, apiKey, true); // `true` to prevent adding a duplicate message
        }
    });
    
    sendChatButton.addEventListener('click', handleChat);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });

    async function handleChat() {
        const userQuery = chatInput.value.trim();
        if (!userQuery) return;
        
        const apiKey = localStorage.getItem('geminiApiKey');
        if (!apiKey) {
            addMessageToChat("Por favor, configura tu clave de API en el menú de ajustes para poder usar el chat.", 'ai');
            return;
        }

        addMessageToChat(userQuery, 'user');
        chatInput.value = '';
        addTypingIndicator();
        
        const today = new Date().toISOString().split('T')[0];
        const notesContext = allNotes.length > 0 ? allNotes.map((note, i) => `Nota ${i+1} (fecha: ${note.date}): "${note.text}"`).join('\n') : "Aún no hay notas.";
        // AI is now aware of dates and today's date
        const systemPrompt = `Eres "DEIMON", un asistente digital. La fecha de hoy es ${today}. Tu prioridad es la información en las notas del usuario, que incluyen fechas. Si te piden notas "de hoy", filtra solo las que coincidan con la fecha actual. Capacidades: Analista de Notas (con filtro de fecha), Calculadora, Asistente General. Sé servicial, claro y conciso.`;
        const fullPrompt = `Contexto de Notas:\n${notesContext}\n\nPregunta: "${userQuery}"`;
        
        await callGeminiAPI(fullPrompt, systemPrompt, apiKey);
    }

    async function callGeminiAPI(prompt, systemPrompt, apiKey) {
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
        
        try {
            const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `Error HTTP: ${response.status}`);
            }
            const result = await response.json();
            const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            
            removeTypingIndicator();
            if (text) { await speakAndShowMessage(text, apiKey); } 
            else { await speakAndShowMessage('Lo siento, no pude procesar tu solicitud.', apiKey); }
        } catch (error) {
            console.error("Error en el chatbot:", error);
            removeTypingIndicator();
            const userFriendlyError = error.message.includes("API key not valid") 
                ? "Error: La clave de API no es válida. Por favor, revísala en la configuración." 
                : 'Hubo un problema de conexión. Inténtalo de nuevo.';
            addMessageToChat(userFriendlyError, 'ai');
        }
    }
    
    function addMessageToChat(message, sender, messageId = null) {
        const bubble = document.createElement('div');
        bubble.classList.add('chat-bubble', 'p-3', 'rounded-lg', 'w-fit', 'text-base');
        bubble.classList.toggle('chat-bubble-user', sender === 'user');
        bubble.classList.toggle('chat-bubble-ai', sender === 'ai');
        bubble.textContent = message.replace(/\n/g, '<br>'); // Render newlines
        bubble.innerHTML = message.replace(/\n/g, '<br>');

        if (sender === 'ai' && messageId) {
            bubble.dataset.id = messageId;
            bubble.addEventListener('click', () => {
                const audioUrl = messageAudios.get(messageId);
                if (audioUrl) new Audio(audioUrl).play();
            });
        }
        chatWindow.appendChild(bubble);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    
    async function speakAndShowMessage(text, apiKey, skipAddMessage = false) {
        const messageId = `msg-${Date.now()}`;
        if (!skipAddMessage) {
            // Remove typing indicator before adding the real message
            removeTypingIndicator();
        }
        
        if (isMuted || !text.trim() || !audioContext) {
            if (!skipAddMessage) addMessageToChat(text, 'ai', messageId);
            return;
        }

        const ttsApiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const ttsPrompt = `Con un tono de voz amable y eficiente, como un asistente personal, di: ${text.split('\n')[0]}`; // Speak only the first line for brevity
        const payload = {
            contents: [{ parts: [{ text: ttsPrompt }] }],
            generationConfig: { responseModalities: ["AUDIO"] }, model: "gemini-2.5-flash-preview-tts"
        };
        
        try {
            const response = await fetch(ttsApiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error('TTS API request failed');
            const result = await response.json();
            const audioData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
            
            if (!skipAddMessage) addMessageToChat(text, 'ai', messageId);
            
            if (audioData) {
                const pcmData = base64ToArrayBuffer(audioData);
                const wavBlob = pcmToWav(new Int16Array(pcmData), 24000);
                const audioUrl = URL.createObjectURL(wavBlob);
                messageAudios.set(messageId, audioUrl);
                new Audio(audioUrl).play();
            }
        } catch (error) {
            console.error('Error al generar voz:', error);
            if (!skipAddMessage) addMessageToChat(text, 'ai', messageId);
        }
    }

    // Helper functions
    function updateMuteButtonIcon() { muteButton.innerHTML = isMuted ? iconSpeakerOff : iconSpeakerOn; }
    muteButton.addEventListener('click', () => { isMuted = !isMuted; updateMuteButtonIcon(); });
    function addTypingIndicator() {
        if(document.getElementById('typing-indicator')) return; // Prevent multiple indicators
        const indicator = document.createElement('div');
        indicator.id = 'typing-indicator';
        indicator.classList.add('chat-bubble', 'chat-bubble-ai', 'p-3', 'rounded-lg', 'w-fit');
        indicator.innerHTML = `<div class="flex items-center gap-1"><span class="h-2 w-2 bg-gray-500 rounded-full animate-bounce"></span><span class="h-2 w-2 bg-gray-500 rounded-full animate-bounce [animation-delay:-.15s]"></span><span class="h-2 w-2 bg-gray-500 rounded-full animate-bounce [animation-delay:-.3s]"></span></div>`;
        chatWindow.appendChild(indicator);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    function removeTypingIndicator() {
        const indicator = document.getElementById('typing-indicator');
        if (indicator) indicator.remove();
    }
    function base64ToArrayBuffer(b64) {
        const bin = atob(b64), len = bin.length, bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) { bytes[i] = bin.charCodeAt(i); }
        return bytes.buffer;
    }
    function pcmToWav(pcm, sampleRate) {
        const wavHdr = new ArrayBuffer(44);
        const view = new DataView(wavHdr);
        const dataSize = pcm.length * pcm.BYTES_PER_ELEMENT;
        view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + dataSize, true); view.setUint32(8, 0x57415645, false);
        view.setUint32(12, 0x666d7420, false); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true);
        view.setUint32(36, 0x64617461, false); view.setUint32(40, dataSize, true);
        const wavBytes = new Uint8Array(44 + dataSize);
        wavBytes.set(new Uint8Array(wavHdr), 0);
        wavBytes.set(new Uint8Array(pcm.buffer), 44);
        return new Blob([wavBytes], { type: 'audio/wav' });
    }

    initialize();
});
</script>
</body>
</html>
